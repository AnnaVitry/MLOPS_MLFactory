services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      # On utilise les variables du .env
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc
    container_name: minio_setup
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'En attente du réveil de MinIO...';
        sleep 2;
      done;
      /usr/bin/mc mb myminio/mlflow --ignore-existing;
      echo 'Bucket mlflow configuré avec succès !';
      exit 0;
      "

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: mlflow_server
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      # On garde l'URL en dur car elle est spécifique au réseau Docker
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000 
      # On utilise le .env pour les secrets
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    command: >
      mlflow server 
      --backend-store-uri sqlite:///mlflow.db 
      --default-artifact-root s3://mlflow/ 
      --host 0.0.0.0 
      --allowed-hosts "*"

  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: ml_api
    depends_on:
      - mlflow
    ports:
      - "8000:8000"
    environment:
      # On utilise la syntaxe ${NOM_DE_LA_VARIABLE}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - MODEL_NAME=${MODEL_NAME}
      - MODEL_ALIAS=${MODEL_ALIAS}

  front:
    build:
      context: .
      dockerfile: src/front/Dockerfile
    container_name: ml_front
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/predict
    volumes:
      - ./src/front:/app/src/front
      - ./data:/app/data

volumes:
  minio_data: