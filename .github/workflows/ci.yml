name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # 1. Vérification des secrets
  # ==========================================
  security:
    name: Audit Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Scan Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 2. Qualité du code (Le juge de paix)
  # ==========================================
  lint:
    name: Code Quality (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        
      - name: Installation de uv et Ruff
        run: |
          pip install uv
          uv pip install --system ruff
          
      - name: Vérification du formatage (PEP 8)
        # Le flag --check fait échouer le test si un fichier a besoin d'être reformaté
        run: ruff format --check .
        
      - name: Analyse stricte (Linting)
        # Vérifie les imports inutilisés, les variables fantômes, etc.
        run: ruff check .

  # ==========================================
  # 3. Crash-test de la documentation
  # ==========================================
  test-docs:
    name: Test Build Sphinx
    runs-on: ubuntu-latest
    # Exigence stricte : On attend que Gitleaks ET Ruff soient au vert
    needs: [security, lint] 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installation et Compilation
        run: |
          pip install uv
          uv pip install --system sphinx sphinx-rtd-theme myst-parser
          cd docs
          make html