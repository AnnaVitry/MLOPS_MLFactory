name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request: # Se lance aussi quand tu prépares une fusion
    branches: [ "main" ]

jobs:
  # 1. Vérification des secrets
  security:
    name: Audit Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Scan Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Crash-test de la documentation
  test-docs:
    name: Test Build Sphinx
    runs-on: ubuntu-latest
    needs: security # Attend que Gitleaks valide
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installation et Compilation
        run: |
          pip install uv
          uv pip install --system sphinx sphinx-rtd-theme myst-parser
          cd docs
          make html